<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fahad Store — Luxury Fashion Pakistan</title>
<meta name="description" content="Premium fashion store in Pakistan. Shop women, men, footwear & accessories. Free delivery above Rs. 2,500. COD available."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ===== DESIGN TOKENS ===== */
:root{
  --ink:#0d0d0d;
  --ink2:#1a1a1a;
  --ink3:#262626;
  --gold:#b8965a;
  --gold2:#d4b07a;
  --gold3:#8a6e3e;
  --cream:#f7f3ee;
  --cream2:#ede8e0;
  --smoke:#c8c0b4;
  --fog:#888077;
  --border:rgba(184,150,90,0.18);
  --border2:rgba(255,255,255,0.07);
  --f-display:'Playfair Display',Georgia,serif;
  --f-body:'Jost',system-ui,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
  --ease-out:cubic-bezier(0,.55,.45,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;font-size:16px;}
body{background:var(--ink);color:var(--cream);font-family:var(--f-body);font-weight:400;line-height:1.65;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
img{display:block;max-width:100%;object-fit:cover;}
a{text-decoration:none;color:inherit;}
ul{list-style:none;}
button{cursor:pointer;border:none;background:none;font-family:var(--f-body);}
input{font-family:var(--f-body);}

/* ===== UTILITY ===== */
.container{max-width:1280px;margin:0 auto;padding:0 32px;}
.eyebrow{font-size:10px;font-weight:600;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);}
.gold-text{color:var(--gold);}
.btn-gold{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:var(--ink);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:15px 36px;border-radius:1px;transition:background .25s var(--ease),transform .2s;white-space:nowrap;}
.btn-gold:hover{background:var(--gold2);transform:translateY(-2px);}
.btn-outline{display:inline-flex;align-items:center;gap:8px;border:1px solid rgba(184,150,90,.5);color:var(--gold);font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:14px 32px;border-radius:1px;transition:all .25s var(--ease);}
.btn-outline:hover{background:rgba(184,150,90,.08);border-color:var(--gold);}
.divider{width:40px;height:1px;background:var(--gold);display:inline-block;}

/* ===== ANNOUNCEMENT ===== */
.topbar{background:var(--gold);padding:9px 24px;text-align:center;}
.topbar p{font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);}
.topbar a{text-decoration:underline;color:var(--ink);}

/* ===== NAV ===== */
.nav{position:sticky;top:0;z-index:200;background:rgba(13,13,13,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border2);}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:72px;}
.nav-logo{font-family:var(--f-display);font-size:28px;font-weight:400;letter-spacing:.06em;color:var(--cream);}
.nav-logo sup{font-size:12px;color:var(--gold);vertical-align:super;margin-left:1px;}
.nav-links{display:flex;gap:40px;}
.nav-links a{font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--smoke);transition:color .2s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width .3s var(--ease);}
.nav-links a:hover{color:var(--cream);}
.nav-links a:hover::after{width:100%;}
.nav-right{display:flex;align-items:center;gap:16px;}
.nav-search{width:36px;height:36px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--smoke);transition:all .2s;}
.nav-search:hover{border-color:var(--gold);color:var(--gold);}
.nav-cart{position:relative;width:36px;height:36px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--smoke);transition:all .2s;}
.nav-cart:hover{border-color:var(--gold);color:var(--gold);}
.cart-badge{position:absolute;top:-4px;right:-4px;background:var(--gold);color:var(--ink);font-size:9px;font-weight:700;width:17px;height:17px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.hamburger{display:none;flex-direction:column;gap:5px;width:36px;height:36px;align-items:center;justify-content:center;}
.hamburger span{width:20px;height:1.5px;background:var(--smoke);border-radius:2px;transition:all .3s;}

/* ===== HERO ===== */
.hero{min-height:100vh;display:grid;grid-template-columns:55% 45%;position:relative;overflow:hidden;}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:100px 80px 100px 0;position:relative;z-index:1;}
.hero-tagline{display:flex;align-items:center;gap:16px;margin-bottom:36px;}
.hero-h1{font-family:var(--f-display);font-size:clamp(54px,6vw,90px);font-weight:400;line-height:1.02;letter-spacing:-.01em;color:var(--cream);margin-bottom:28px;}
.hero-h1 em{font-style:italic;color:var(--gold);}
.hero-p{font-size:16px;font-weight:300;color:var(--smoke);max-width:400px;line-height:1.8;margin-bottom:48px;}
.hero-ctas{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.hero-right{position:relative;overflow:hidden;}
.hero-mosaic{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;height:100%;gap:2px;}
.hero-cell{position:relative;overflow:hidden;background:var(--ink2);}
.hero-cell img{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--ease);}
.hero-cell:hover img{transform:scale(1.07);}
.hero-cell-label{position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);font-size:10px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold2);}
.hero-badge{position:absolute;top:24px;right:24px;z-index:10;width:78px;height:78px;border-radius:50%;background:var(--gold);color:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;font-size:10px;font-weight:700;line-height:1.3;letter-spacing:.06em;text-transform:uppercase;box-shadow:0 8px 32px rgba(184,150,90,.4);}
.hero-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.5;}
.hero-scroll span{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--smoke);}
.scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--smoke),transparent);animation:scrollDown 1.8s ease-in-out infinite;}
@keyframes scrollDown{0%{transform:scaleY(0);transform-origin:top;}50%{transform:scaleY(1);transform-origin:top;}51%{transform:scaleY(1);transform-origin:bottom;}100%{transform:scaleY(0);transform-origin:bottom;}}

/* Hero stats */
.hero-stats{display:flex;gap:0;margin-top:56px;padding-top:40px;border-top:1px solid var(--border2);}
.hero-stat{flex:1;padding-right:24px;border-right:1px solid var(--border2);}
.hero-stat:last-child{border-right:none;padding-right:0;padding-left:24px;}
.hero-stat:not(:first-child):not(:last-child){padding-left:24px;}
.stat-val{font-family:var(--f-display);font-size:34px;font-weight:400;color:var(--gold);line-height:1;}
.stat-lbl{font-size:10px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--fog);margin-top:6px;}

/* ===== TICKER ===== */
.ticker{background:var(--gold);overflow:hidden;padding:11px 0;}
.ticker-track{display:flex;animation:ticker 22s linear infinite;white-space:nowrap;}
.ticker-item{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);padding:0 48px;}
.ticker-dot{color:rgba(0,0,0,.35);margin-left:48px;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}

/* ===== SECTION COMMONS ===== */
.section{padding:112px 0;}
.section-head{margin-bottom:56px;}
.section-head.center{text-align:center;}
.section-title{font-family:var(--f-display);font-size:clamp(36px,4vw,56px);font-weight:400;line-height:1.08;color:var(--cream);margin-top:14px;}
.section-title em{font-style:italic;color:var(--gold);}
.section-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:56px;}

/* ===== BRANDS ===== */
.brands{padding:56px 0;border-bottom:1px solid var(--border2);}
.brands-label{text-align:center;margin-bottom:32px;}
.brands-grid{display:flex;align-items:center;justify-content:center;gap:56px;flex-wrap:wrap;}
.brand-name{font-family:var(--f-display);font-size:18px;font-weight:400;color:var(--fog);letter-spacing:.08em;transition:color .2s;}
.brand-name:hover{color:var(--gold);}

/* ===== CATEGORIES ===== */
.cat-section{background:var(--ink2);}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:420px 300px;gap:3px;}
.cat-card{position:relative;overflow:hidden;cursor:pointer;background:var(--ink3);}
.cat-card.tall{grid-row:span 2;}
.cat-card.wide{grid-column:span 2;}
.cat-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .8s var(--ease);}
.cat-card:hover .cat-img{transform:scale(1.06);}
.cat-veil{position:absolute;inset:0;background:linear-gradient(160deg,rgba(0,0,0,.05) 0%,rgba(0,0,0,.6) 100%);transition:background .4s;}
.cat-card:hover .cat-veil{background:linear-gradient(160deg,rgba(0,0,0,.1) 0%,rgba(0,0,0,.75) 100%);}
.cat-body{position:absolute;bottom:0;left:0;right:0;padding:32px;transform:translateY(8px);transition:transform .4s var(--ease);}
.cat-card:hover .cat-body{transform:translateY(0);}
.cat-eyebrow{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--gold2);margin-bottom:8px;}
.cat-name{font-family:var(--f-display);font-size:28px;font-weight:400;color:var(--cream);line-height:1.1;margin-bottom:10px;}
.cat-count{font-size:11px;color:var(--smoke);letter-spacing:.1em;}
.cat-btn{display:inline-flex;align-items:center;gap:8px;margin-top:16px;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);opacity:0;transform:translateY(8px);transition:all .35s var(--ease);}
.cat-card:hover .cat-btn{opacity:1;transform:translateY(0);}
.cat-arrow{width:28px;height:28px;border:1px solid rgba(184,150,90,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.cat-card:hover .cat-arrow{background:rgba(184,150,90,.15);}

/* ===== PRODUCTS ===== */
.products-section{background:var(--ink);}
.filter-tabs{display:flex;gap:4px;margin-bottom:48px;border-bottom:1px solid var(--border2);padding-bottom:0;}
.filter-tab{font-size:11px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--fog);padding:12px 24px;border-bottom:2px solid transparent;transition:all .2s;cursor:pointer;margin-bottom:-1px;}
.filter-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.filter-tab:hover{color:var(--cream);}
.products-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.prod-card{background:var(--ink2);border:1px solid var(--border2);border-radius:2px;overflow:hidden;transition:transform .35s var(--ease),box-shadow .35s,border-color .35s;}
.prod-card:hover{transform:translateY(-8px);box-shadow:0 32px 64px rgba(0,0,0,.6);border-color:var(--border);}
.prod-img-wrap{aspect-ratio:3/4;position:relative;overflow:hidden;background:var(--ink3);}
.prod-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--ease);}
.prod-card:hover .prod-img-wrap img{transform:scale(1.06);}
.prod-badge{position:absolute;top:12px;left:12px;font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:4px 10px;border-radius:1px;}
.badge-new{background:var(--gold);color:var(--ink);}
.badge-sale{background:#c0392b;color:#fff;}
.badge-hot{background:var(--ink);color:var(--gold);border:1px solid var(--gold);}
.prod-overlay{position:absolute;inset:0;background:rgba(0,0,0,.4);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;gap:8px;}
.prod-card:hover .prod-overlay{opacity:1;}
.btn-add{width:100%;background:var(--gold);color:var(--ink);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;padding:13px;border-radius:1px;transition:background .2s;cursor:pointer;border:none;}
.btn-add:hover{background:var(--gold2);}
.btn-wa-prod{width:100%;background:#25D366;color:#fff;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:11px;border-radius:1px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .2s;}
.btn-wa-prod:hover{background:#1da851;}
.prod-info{padding:18px 16px 16px;}
.prod-cat{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:6px;}
.prod-name{font-family:var(--f-display);font-size:17px;font-weight:400;color:var(--cream);line-height:1.25;margin-bottom:12px;}
.prod-price-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.prod-price{font-size:16px;font-weight:600;color:var(--gold);}
.prod-price-old{font-size:13px;color:var(--fog);text-decoration:line-through;}
.prod-stars{display:flex;align-items:center;gap:4px;}
.prod-stars svg{width:11px;height:11px;fill:var(--gold);}
.prod-stars span{font-size:11px;color:var(--fog);margin-left:4px;}
.prod-origin{font-size:10px;color:var(--fog);margin-top:6px;letter-spacing:.06em;}

/* ===== FEATURES ===== */
.features-section{background:var(--ink2);border-top:1px solid var(--border2);border-bottom:1px solid var(--border2);padding:80px 0;}
.features-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border2);}
.feature-box{background:var(--ink2);padding:40px 32px;text-align:center;}
.feature-icon{width:48px;height:48px;border:1px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.feature-icon svg{width:20px;height:20px;stroke:var(--gold);fill:none;}
.feature-title{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--cream);margin-bottom:8px;}
.feature-desc{font-size:13px;color:var(--fog);line-height:1.65;}

/* ===== SALE BANNER ===== */
.sale-section{background:var(--ink);padding:120px 0;position:relative;overflow:hidden;text-align:center;}
.sale-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 50% 50%,rgba(184,150,90,.07) 0%,transparent 70%);}
.sale-inner{position:relative;z-index:1;}
.sale-h2{font-family:var(--f-display);font-size:clamp(44px,6vw,80px);font-weight:400;line-height:1.06;margin:16px 0 20px;}
.sale-h2 em{font-style:italic;color:var(--gold);}
.sale-sub{font-size:16px;font-weight:300;color:var(--smoke);max-width:480px;margin:0 auto 44px;line-height:1.75;}
.countdown{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:44px;}
.cd-unit{background:var(--ink2);border:1px solid var(--border2);border-radius:2px;padding:16px 22px;text-align:center;min-width:76px;}
.cd-num{font-family:var(--f-display);font-size:40px;font-weight:400;color:var(--gold);line-height:1;}
.cd-label{font-size:9px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--fog);margin-top:5px;}
.cd-colon{font-family:var(--f-display);font-size:36px;color:var(--border);padding-bottom:14px;}

/* ===== TESTIMONIALS ===== */
.testi-section{background:var(--ink2);}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:56px;}
.testi-card{background:var(--ink);border:1px solid var(--border2);border-radius:2px;padding:36px;transition:border-color .3s;}
.testi-card:hover{border-color:var(--border);}
.testi-quote{font-size:32px;font-family:var(--f-display);color:var(--gold);opacity:.4;line-height:1;margin-bottom:16px;}
.testi-text{font-family:var(--f-display);font-size:17px;font-weight:400;font-style:italic;color:var(--cream);line-height:1.7;margin-bottom:28px;}
.testi-author{display:flex;align-items:center;gap:14px;}
.testi-av{width:44px;height:44px;border-radius:50%;overflow:hidden;border:1px solid var(--border);flex-shrink:0;}
.testi-av img{width:100%;height:100%;object-fit:cover;}
.testi-name{font-size:13px;font-weight:600;color:var(--cream);}
.testi-loc{font-size:11px;color:var(--fog);margin-top:2px;}
.testi-stars{display:flex;gap:2px;margin-bottom:20px;}
.testi-stars svg{width:13px;height:13px;fill:var(--gold);}

/* ===== NEWSLETTER ===== */
.nl-section{background:var(--gold);padding:88px 0;text-align:center;}
.nl-eyebrow{color:rgba(0,0,0,.55);margin-bottom:12px;}
.nl-h2{font-family:var(--f-display);font-size:clamp(32px,4vw,52px);font-weight:400;color:var(--ink);margin-bottom:16px;}
.nl-p{font-size:15px;color:rgba(0,0,0,.58);margin-bottom:36px;}
.nl-form{display:flex;max-width:440px;margin:0 auto;}
.nl-input{flex:1;padding:15px 20px;font-size:14px;font-family:var(--f-body);background:rgba(0,0,0,.1);border:none;color:var(--ink);border-radius:1px 0 0 1px;outline:none;}
.nl-input::placeholder{color:rgba(0,0,0,.4);}
.nl-btn{background:var(--ink);color:var(--gold);font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;padding:15px 28px;border-radius:0 1px 1px 0;cursor:pointer;border:none;transition:background .2s;}
.nl-btn:hover{background:var(--ink2);}

/* ===== FOOTER ===== */
footer{background:var(--ink);border-top:1px solid var(--border2);padding:80px 0 0;}
.footer-grid{display:grid;grid-template-columns:2.2fr 1fr 1fr 1fr;gap:60px;padding-bottom:60px;border-bottom:1px solid var(--border2);}
.footer-brand{font-family:var(--f-display);font-size:26px;font-weight:400;letter-spacing:.06em;margin-bottom:16px;}
.footer-brand sup{font-size:11px;color:var(--gold);vertical-align:super;}
.footer-desc{font-size:13px;font-weight:300;color:var(--fog);line-height:1.75;max-width:240px;margin-bottom:28px;}
.footer-socials{display:flex;gap:10px;}
.soc-btn{width:34px;height:34px;border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.soc-btn:hover{border-color:var(--gold);background:rgba(184,150,90,.08);}
.soc-btn svg{width:14px;height:14px;fill:var(--fog);transition:fill .2s;}
.soc-btn:hover svg{fill:var(--gold);}
.footer-col-title{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;}
.footer-links{display:flex;flex-direction:column;gap:12px;}
.footer-links a{font-size:13px;color:var(--fog);transition:color .2s;}
.footer-links a:hover{color:var(--cream);}
.footer-bottom{padding:22px 0;display:flex;align-items:center;justify-content:space-between;}
.footer-copy{font-size:12px;color:var(--fog);}
.footer-copy span{color:var(--gold);}
.pay-badges{display:flex;gap:8px;}
.pay-badge{background:var(--ink2);border:1px solid var(--border2);padding:5px 12px;border-radius:2px;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--fog);}

/* ===== CART ===== */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:400;opacity:0;pointer-events:none;transition:opacity .3s;}
.cart-overlay.open{opacity:1;pointer-events:all;}
.cart-panel{position:fixed;top:0;right:0;width:420px;height:100dvh;background:var(--ink2);border-left:1px solid var(--border2);z-index:401;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .4s var(--ease);}
.cart-panel.open{transform:translateX(0);}
.cart-hd{display:flex;align-items:center;justify-content:space-between;padding:24px;border-bottom:1px solid var(--border2);}
.cart-hd-title{font-family:var(--f-display);font-size:22px;font-weight:400;}
.cart-close-btn{width:34px;height:34px;border:1px solid var(--border2);border-radius:50%;display:flex;align-i
